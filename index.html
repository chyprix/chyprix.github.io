<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CHYPRIX CORE | PRIVATE SUITE</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0806">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #141210, #030201);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    :root {
      --gold: #c6a75e;
      --gold2: #e7d7a8;
      --card-bg: #0a0a0a;
      --border: #1a1a1a;
      --text-dim: #aaa;
    }

    .core {
      max-width: 520px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 1.5rem;
      border: 1px solid var(--border);
      padding: 1.8rem;
      position: relative;
      box-shadow: 0 40px 120px rgba(0,0,0,0.9), inset 0 0 30px rgba(255,255,255,0.02);
    }

    /* gold line atas */
    .core::before {
      content: "";
      display: block;
      width: 100%;
      height: 3px;
      margin: 0 auto 1.2rem auto;
      border-radius: 2px;
      background: linear-gradient(90deg,
        rgba(198,167,94,0),
        rgba(198,167,94,0.2),
        rgba(198,167,94,0.6),
        rgba(231,215,168,1),
        rgba(198,167,94,0.6),
        rgba(198,167,94,0.2),
        rgba(198,167,94,0)
      );
      box-shadow: 0 0 12px rgba(198,167,94,0.25), 0 0 24px rgba(198,167,94,0.15);
    }

    /* bottom glow */
    .core::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background: linear-gradient(180deg, rgba(198,167,94,0), rgba(198,167,94,0.08), rgba(198,167,94,0.15));
      border-radius: 0 0 1.5rem 1.5rem;
      pointer-events: none;
    }

    .header {
      text-align: center;
      margin-bottom: 1.2rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid #111;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 8px;
      font-weight: 400;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subline {
      font-size: 0.6rem;
      color: #555;
      margin-top: 0.2rem;
      letter-spacing: 1px;
    }

    .status {
      margin-top: 0.5rem;
      font-size: 0.6rem;
      color: #777;
    }

    .status span {
      color: #00ff9c;
    }

    /* grid 2 kolom */
    .apps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .app-card {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1rem 0.5rem;
      text-align: center;
      transition: 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .app-card:hover {
      border-color: rgba(198,167,94,0.6);
      background: #0c0c0c;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 12px rgba(198,167,94,0.1);
    }

    .app-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-desc {
      font-size: 0.55rem;
      color: var(--text-dim);
    }

    .launch {
      font-size: 0.7rem;
      color: var(--gold);
      opacity: 0.7;
    }

    .footer {
      margin-top: 1rem;
      font-size: 0.55rem;
      text-align: center;
      color: #555;
      border-top: 1px solid #111;
      padding-top: 0.8rem;
    }

    @media (max-width: 480px) {
      .core { padding: 1.2rem; }
      h1 { font-size: 1.3rem; letter-spacing: 5px; }
      .app-name { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="core">
  <div class="header">
    <h1>CHYPRIX CORE</h1>
    <div class="subline">Private Control Interface</div>
    <div class="status">
      SYSTEM <span>ACTIVE</span> | UTC <span id="utc"></span>
    </div>
  </div>

  <div class="apps-grid">
    <div class="app-card" onclick="go('/encrypt/')">
      <div class="app-name">ENCRYPT</div>
      <div class="app-desc">AES-256 file vault</div>
      <div class="launch">▶ LAUNCH</div>
    </div>
    <div class="app-card" onclick="go('/nano/')">
      <div class="app-name">NANO</div>
      <div class="app-desc">Squeeze & encrypt text</div>
      <div class="launch">▶ LAUNCH</div>
    </div>
    <div class="app-card" onclick="go('/stego/')">
      <div class="app-name">STEGO</div>
      <div class="app-desc">Steganography phantom</div>
      <div class="launch">▶ LAUNCH</div>
    </div>
    <div class="app-card" onclick="go('/keypass/')">
      <div class="app-name">KEYPASS</div>
      <div class="app-desc">Dual key generator</div>
      <div class="launch">▶ LAUNCH</div>
    </div>
  </div>

  <div class="footer">
    CORE ACTIVE | UTC <span id="clock"></span>
  </div>
</div>

<script>
  // Ganti BASE_URL sesuai domain brand Anda
  const BASE_URL = 'https://chyprix.github.io';
  
  function go(path) {
    // Menggabungkan base URL dengan path subfolder
    const fullUrl = BASE_URL + path;
    window.open(fullUrl, '_blank');
  }

  function updateTime() {
    const now = new Date();
    const utc = now.toISOString().split('T')[1].split('.')[0];
    document.getElementById('utc').innerText = utc;
    document.getElementById('clock').innerText = utc;
  }
  setInterval(updateTime, 1000);
  updateTime();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW registered:', reg))
        .catch(err => console.log('SW error:', err));
    });
  }
</script>
</body>
</html>
